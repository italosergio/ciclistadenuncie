<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estilo 1 - Pill com Bandeiras</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .font-bungee { font-family: 'Bungee', cursive; }
  </style>
</head>
<body>
  <!-- Simula o canto superior direito do site -->
  <div class="fixed top-4 right-4 z-50">
    <!-- ESTILO 1: Pill com bandeira + dropdown elegante -->
    <div class="relative" id="switcher1">
      <button
        id="toggleBtn"
        class="flex items-center gap-2 px-3 py-2 text-xs font-semibold
               bg-gray-900/90 backdrop-blur-sm
               border border-gray-700/50
               rounded-full shadow-lg shadow-black/20
               hover:bg-gray-800 hover:border-gray-600
               active:scale-95
               transition-all duration-200 ease-in-out"
      >
        <span class="text-sm">🇧🇷</span>
        <span class="tracking-wide text-gray-200">PT</span>
        <svg id="chevron" class="w-3 h-3 text-gray-500 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Dropdown -->
      <div id="dropdown" class="hidden absolute right-0 mt-2 min-w-[150px]
                  bg-gray-900/95 backdrop-blur-md
                  border border-gray-700/50
                  rounded-xl shadow-2xl shadow-black/30
                  overflow-hidden origin-top-right">
        
        <!-- PT-BR (ativo) -->
        <button class="w-full flex items-center gap-2.5 px-3.5 py-2.5 text-xs
                       bg-red-600/10 text-red-400 font-semibold
                       hover:bg-red-600/20 transition-colors">
          <span class="text-base">🇧🇷</span>
          <span>Português</span>
          <svg class="w-3.5 h-3.5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </button>

        <!-- EN -->
        <button class="w-full flex items-center gap-2.5 px-3.5 py-2.5 text-xs
                       text-gray-400 hover:text-gray-200 hover:bg-gray-800/50 transition-colors">
          <span class="text-base">🇺🇸</span>
          <span>English</span>
        </button>

        <!-- ES -->
        <button class="w-full flex items-center gap-2.5 px-3.5 py-2.5 text-xs
                       text-gray-400 hover:text-gray-200 hover:bg-gray-800/50 transition-colors">
          <span class="text-base">🇪🇸</span>
          <span>Español</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Conteúdo simulando a home -->
  <div class="text-center max-w-lg px-6">
    <h1 class="font-bungee text-4xl md:text-6xl text-red-500 mb-6">🚲</h1>
    <h2 class="font-bungee text-2xl md:text-3xl text-white mb-4">Ciclista, Denuncie!</h2>
    <p class="text-gray-400 text-sm leading-relaxed mb-8">
      Registre e visualize denúncias de violência no trânsito, infraestrutura precária e incidentes contra ciclistas.
    </p>
    <div class="inline-block bg-white text-black px-6 py-3 rounded-lg text-sm font-bold hover:bg-red-500 hover:text-white transition-all cursor-pointer active:scale-95">
      FAZER DENÚNCIA
    </div>
  </div>

  <!-- Label do sketch -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-gray-600 text-center">
    <div class="bg-gray-900/80 px-3 py-1.5 rounded-full border border-gray-800">
      <span class="font-bold text-red-500">Estilo 1:</span> Pill com bandeiras — usado por Google, Duolingo, Booking.com
    </div>
  </div>

  <script>
    const btn = document.getElementById('toggleBtn');
    const dropdown = document.getElementById('dropdown');
    const chevron = document.getElementById('chevron');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('hidden');
      chevron.classList.toggle('rotate-180');
    });

    document.addEventListener('click', () => {
      dropdown.classList.add('hidden');
      chevron.classList.remove('rotate-180');
    });
  </script>
</body>
</html>
