<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estilo 2 - Segmented Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .font-bungee { font-family: 'Bungee', cursive; }
  </style>
</head>
<body>
  <!-- Simula o canto superior direito do site -->
  <div class="fixed top-4 right-4 z-50">
    <!-- ESTILO 2: Segmented Control (PT | EN | ES) -->
    <div class="flex items-center bg-gray-900/80 backdrop-blur-sm border border-gray-700/40 rounded-lg p-0.5 shadow-lg shadow-black/20">
      <!-- PT (ativo) -->
      <button id="btnPT"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-md
               bg-red-600 text-white shadow-sm shadow-red-600/30
               transition-all duration-200 active:scale-95">
        <span>🇧🇷</span>
        <span class="tracking-wide">PT</span>
      </button>

      <!-- EN -->
      <button id="btnEN"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md
               text-gray-400 hover:text-gray-200
               transition-all duration-200 active:scale-95">
        <span>🇺🇸</span>
        <span class="tracking-wide">EN</span>
      </button>

      <!-- ES -->
      <button id="btnES"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md
               text-gray-400 hover:text-gray-200
               transition-all duration-200 active:scale-95">
        <span>🇪🇸</span>
        <span class="tracking-wide">ES</span>
      </button>
    </div>
  </div>

  <!-- Conteúdo simulando a home -->
  <div class="text-center max-w-lg px-6">
    <h1 class="font-bungee text-4xl md:text-6xl text-red-500 mb-6">🚲</h1>
    <h2 class="font-bungee text-2xl md:text-3xl text-white mb-4">Ciclista, Denuncie!</h2>
    <p class="text-gray-400 text-sm leading-relaxed mb-8">
      Registre e visualize denúncias de violência no trânsito, infraestrutura precária e incidentes contra ciclistas.
    </p>
    <div class="inline-block bg-white text-black px-6 py-3 rounded-lg text-sm font-bold hover:bg-red-500 hover:text-white transition-all cursor-pointer active:scale-95">
      FAZER DENÚNCIA
    </div>
  </div>

  <!-- Label do sketch -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-gray-600 text-center">
    <div class="bg-gray-900/80 px-3 py-1.5 rounded-full border border-gray-800">
      <span class="font-bold text-red-500">Estilo 2:</span> Segmented Control — usado por Linear, Vercel, Apple
    </div>
  </div>

  <script>
    const buttons = [document.getElementById('btnPT'), document.getElementById('btnEN'), document.getElementById('btnES')];
    const activeClasses = 'bg-red-600 text-white shadow-sm shadow-red-600/30';
    const inactiveClasses = 'text-gray-400 hover:text-gray-200';

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => {
          b.classList.remove('bg-red-600', 'text-white', 'shadow-sm', 'shadow-red-600/30');
          b.classList.add('text-gray-400', 'hover:text-gray-200');
          b.classList.add('font-medium');
          b.classList.remove('font-semibold');
        });
        btn.classList.remove(...inactiveClasses.split(' '));
        btn.classList.add(...activeClasses.split(' '));
        btn.classList.remove('font-medium');
        btn.classList.add('font-semibold');
      });
    });
  </script>
</body>
</html>
