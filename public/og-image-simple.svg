  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#dc2626" stroke-width="8" rx="20"/>
  
  <!-- Emoji bicicleta grande -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="180" text-anchor="middle" dominant-baseline="middle">🚲</text>
  
